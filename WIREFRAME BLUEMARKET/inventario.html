<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Inventario - PescaDirecta</title>
    <link rel="stylesheet" href="css/inventario.css">
</head>
<body>

    <header class="inventario-header">
        <a href="index.html" style="text-decoration: none;">
            <div class="logo">🐟 PescaDirecta</div>
        </a>
        <nav>
            <a href="index.html">🏠 Inicio</a>
            <a href="inventario.html" class="activo">📦 Mi Inventario</a>
        </nav>
    </header>

    <div class="container">
        
        <!-- VISTA LISTA -->
        <div id="vistaLista" class="vista-lista activa">
            
            <div class="stats-bar">
                <div class="stat-card">
                    <h3 id="totalProductos">0</h3>
                    <p>Productos</p>
                </div>
                <div class="stat-card">
                    <h3 id="productosActivos">0</h3>
                    <p>Activos</p>
                </div>
                <div class="stat-card">
                    <h3 id="productosAgotados">0</h3>
                    <p>Agotados</p>
                </div>
            </div>

            <div class="acciones-vendedor">
                <button class="btn-agregar" onclick="mostrarFormulario()">
                    ➕ Agregar Nuevo Producto
                </button>
                <button class="btn-historial" onclick="verHistorial()">
                    📊 Ver Historial de Ventas
                </button>
            </div>

            <div class="seccion">
                <h2>Mis Productos</h2>
                
                <div class="barra">
                    <input type="text" id="buscarProducto" placeholder="Buscar en mis productos...">
                </div>

                <div class="tabla-contenedor">
                    <table id="tablaMisProductos">
                        <thead>
                            <tr>
                                <th>IMAGEN</th>
                                <th>NOMBRE</th>
                                <th>PRECIO</th>
                                <th>CANTIDAD</th>
                                <th>ESTADO</th>
                                <th>ACCIONES</th>
                            </tr>
                        </thead>
                        <tbody>
                           
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- VISTA FORMULARIO -->
        <div id="vistaFormulario" class="vista-formulario">
            <button class="btn-volver" onclick="mostrarLista()">← Volver a mi inventario</button>
            
            <div class="seccion">
                <h2>Agregar Nuevo Producto</h2>
                
                <form id="formProducto" action="php/guardar_producto.php" method="POST" enctype="multipart/form-data">
                    
                    <input type="text" name="nombre" placeholder="Nombre del producto *" required>
                    <input type="text" name="descripcion" placeholder="Descripción" maxlength="250">
                    <input type="number" name="precio" placeholder="Precio *" step="0.01" required>
                    <input type="text" name="origen" placeholder="Origen (ej: Santa Marta)">
                    
                    <select name="disponibilidad" required>
                        <option value="">¿Disponible? *</option>
                        <option value="1">Sí</option>
                        <option value="0">No</option>
                    </select>
                    
                    <input type="text" name="pescador_responsable" placeholder="Pescador responsable">
                    <input type="number" name="cantidad" placeholder="Cantidad en stock" min="0">
                    <input type="date" name="fecha" placeholder="Fecha de captura">
                    
                    <select name="tipo_pesca">
                        <option value="">Tipo de pesca</option>
                        <option value="Artesanal">Artesanal</option>
                        <option value="Industrial">Industrial</option>
                        <option value="Sostenible">Sostenible</option>
                        <option value="Deportiva">Deportiva</option>
                    </select>

                    <div class="drop-zone" id="dropZone">
                        <div class="drop-zone__icon">📁</div>
                        <div class="drop-zone__text">
                            <strong>Arrastra tu imagen aquí</strong><br>
                            o haz clic para seleccionar
                        </div>
                        <div class="drop-zone__preview" id="previewContainer">
                            <img id="previewImage" src="" alt="Vista previa">
                            <div class="drop-zone__file-info" id="fileInfo"></div>
                            <button type="button" class="drop-zone__remove" id="removeFile">❌ Cambiar imagen</button>
                        </div>
                        <input type="file" name="imagen" id="fileInput" class="hidden-input" accept="image/*">
                    </div>

                    <div class="boton-guardar">
                        <button type="submit" class="btn-secundario">💾 Guardar Producto</button>
                    </div>
                </form>
            </div>
        </div>

    </div>

    <script src="js/sesion.js"></script>
    <script src="js/inventario.js"></script>
</body>
</html>
